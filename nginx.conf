server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Angular SPA routing — always serve index.html for unknown routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # DNS resolver for Kubernetes (CoreDNS)
    # Using a variable in proxy_pass prevents Nginx from crashing at startup
    # if the backend service is not immediately resolvable.
    resolver 10.96.0.10 valid=30s;

    # Proxy API calls to backend — avoids CORS in production
    location /springsecurity/ {
        set $backend_service medicarepi-backend-service;
        proxy_pass http://$backend_service:8081/springsecurity/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
