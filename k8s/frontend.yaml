apiVersion: v1
kind: Service
metadata:
  name: medicarepi-frontend-service
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30002
  selector:
    app: medicarepi-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medicarepi-frontend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medicarepi-frontend
  template:
    metadata:
      labels:
        app: medicarepi-frontend
    spec:
      containers:
      - name: frontend
        image: azizmelki1/medicarepi-frontend:latest
        ports:
        - containerPort: 80
        env:
        - name: API_BASE_URL
          value: "http://medicarepi-backend-service:8081/springsecurity"
