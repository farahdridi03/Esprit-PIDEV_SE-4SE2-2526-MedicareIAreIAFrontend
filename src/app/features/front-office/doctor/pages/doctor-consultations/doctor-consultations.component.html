<div class="doctor-wrapper">
    <app-doctor-sidebar></app-doctor-sidebar>
    <div class="main-body">
        <app-doctor-topbar></app-doctor-topbar>
        
        <div class="content-area">
            <div class="page-header">
                <h2>Patient Consultations</h2>
                <div class="actions">
                    <button class="btn-premium btn-cancel" *ngIf="patientId" [routerLink]="['/front/doctor/patient', patientId, 'record']">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>
                        Back to Record
                    </button>
                    <button class="btn-premium btn-save" (click)="openAddForm()" *ngIf="!showForm">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                        Add New Consultation
                    </button>
                </div>
            </div>

            <div class="loading-state" *ngIf="loading">
                <p>Loading consultations...</p>
            </div>

            <div class="data-table-container" *ngIf="!loading && !showForm">
                <table class="data-table" *ngIf="consultations.length > 0; else noData">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Observations</th>
                            <th>Notes</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let item of consultations">
                            <td><strong>{{ item.date | date:'medium' }}</strong></td>
                            <td>{{ item.observations || 'N/A' }}</td>
                            <td>{{ item.notes }}</td>
                            <td class="action-cells">
                                <button class="action-btn edit" (click)="openEditForm(item)" title="Edit">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" /></svg>
                                </button>
                                <button class="action-btn delete" (click)="deleteConsultation(item.id!)" title="Delete">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <ng-template #noData>
                    <div class="empty-state">
                        <p>No consultations found for this patient.</p>
                    </div>
                </ng-template>
            </div>

            <!-- Form -->
            <div class="form-container" *ngIf="showForm">
                <h3>{{ currentConsultation.id ? 'Edit Consultation' : 'Add New Consultation' }}</h3>
                <form (ngSubmit)="saveConsultation()" #consultationForm="ngForm">
                    <div class="form-group">
                        <label>Date and Time</label>
                        <input type="datetime-local" name="date" [(ngModel)]="currentConsultation.date" required class="form-control">
                    </div>

                    <div class="form-group">
                        <label>Observations</label>
                        <textarea name="observations" [(ngModel)]="currentConsultation.observations" class="form-control" rows="2" placeholder="Patient observations"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Consultation Notes</label>
                        <textarea name="notes" [(ngModel)]="currentConsultation.notes" required class="form-control" rows="5" placeholder="Details of the visit..."></textarea>
                    </div>
                    
                    <div class="form-actions" style="display: flex; gap: 12px; justify-content: flex-end;">
                        <button type="button" class="btn-premium btn-cancel" (click)="cancelForm()">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
                            Cancel
                        </button>
                        <button type="submit" class="btn-premium btn-save" [disabled]="!consultationForm.valid">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg>
                            Save Consultation
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
