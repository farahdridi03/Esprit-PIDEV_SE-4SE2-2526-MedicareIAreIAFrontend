<div class="doctor-wrapper">
    <app-doctor-sidebar></app-doctor-sidebar>
    <div class="main-body">
        <app-doctor-topbar></app-doctor-topbar>
        
        <div class="content-area">
            <!-- Glassmorphism Header (Standardized) -->
            <div class="record-header box" style="background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #edf2f7; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <div class="info">
                    <h3 style="margin: 0; color: #2d3748; font-weight: 700;">Consultation #{{ consultation?.id }} Management</h3>
                    <p style="margin: 5px 0 0 0; color: #718096; font-size: 14px;">Session Date: {{ consultation?.date | date:'MMMM d, yyyy' }}</p>
                </div>
                <!-- Back Link -->
                <button class="btn-premium btn-cancel" [routerLink]="['/front/doctor/patient', patientId, 'consultations']">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>
                    Back to Consultations
                </button>
            </div>

            <!-- Summary Cards -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                <div class="summary-card box" style="background: white; padding: 20px; border-radius: 12px; border: 1px solid #edf2f7; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                    <label style="display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #a0aec0; font-weight: 800; margin-bottom: 10px;">Observations</label>
                    <div style="font-size: 14px; line-height: 1.6; color: #2d3748;">
                        {{ consultation?.observations || 'No observations.' }}
                    </div>
                </div>
                <div class="summary-card box" style="background: white; padding: 20px; border-radius: 12px; border: 1px solid #edf2f7; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                    <label style="display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #a0aec0; font-weight: 800; margin-bottom: 10px;">Additional Notes</label>
                    <div style="font-size: 14px; line-height: 1.6; color: #4a5568;">
                        {{ consultation?.notes || 'No notes.' }}
                    </div>
                </div>
            </div>

            <!-- Embedded CRUD Sections with better spacing and visual grouping -->
            <div class="crud-sections" style="display: flex; flex-direction: column; gap: 40px;">
                <div style="position: relative;">
                    <div style="position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: #f56565; border-radius: 0 4px 4px 0;"></div>
                    <app-doctor-diagnoses [consultationId]="consultationId"></app-doctor-diagnoses>
                </div>
                
                <div style="position: relative;">
                    <div style="position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: #667eea; border-radius: 0 4px 4px 0;"></div>
                    <app-doctor-treatments [consultationId]="consultationId"></app-doctor-treatments>
                </div>
                
                <div style="position: relative;">
                    <div style="position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: #ed8936; border-radius: 0 4px 4px 0;"></div>
                    <app-doctor-prescriptions [consultationId]="consultationId"></app-doctor-prescriptions>
                </div>
            </div>
        </div>

        <!-- States -->
        <div class="content-area loading-state" *ngIf="loading" style="text-align: center; padding: 100px; color: #a0aec0;">
            <p style="font-size: 18px;">Initializing management interface...</p>
        </div>
        <div class="content-area error-state" *ngIf="!loading && !consultation" style="text-align: center; padding: 100px; color: #e53e3e;">
            <p style="font-size: 20px; font-weight: 700;">Consultation session not found.</p>
            <button class="back-btn" [routerLink]="['/front/doctor/patient', patientId, 'record']" style="margin-top: 20px; background: #38a169; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer;">Return to Dashboard</button>
        </div>
    </div>
</div>
