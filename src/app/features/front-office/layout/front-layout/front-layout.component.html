<nav class="navbar">
    <a routerLink="/" class="logo-container">
        <svg class="logo-heart" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
        </svg>
        MEDICAREAI
    </a>

    <div class="nav-links">
        <a href="#">Why MEDICAREAI</a>
        <a href="#">Services</a>
        <a href="#">Doctors</a>
        <a href="#">Labs</a>
        <a href="#">Pharmacy</a>
        <a href="#">Forum</a>
        <a routerLink="/front/events" routerLinkActive="active">Events</a>
        <a *ngIf="isLoggedIn" routerLink="/front/my-event-registrations" routerLinkActive="active">My Registrations</a>
        <a href="#">Contact</a>
    </div>

    <div class="nav-actions">
        <ng-container *ngIf="isLoggedIn; else loginBtn">
            <!-- Notification Bell -->
            <div class="notif-wrapper">
                <div class="notif-bell" (click)="toggleNotifications()">
                    <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                </div>

                <!-- Dropdown -->
                <div class="notif-dropdown" *ngIf="showNotifications">
                    <div class="notif-header">
                        <span>Notifications</span>
                        <button (click)="markAllRead()" *ngIf="unreadCount > 0">Mark read</button>
                    </div>
                    <div class="notif-list">
                        <div *ngIf="notifications.length === 0" class="empty-notif">No notifications</div>
                        <div *ngFor="let n of notifications" class="notif-item" [class.unread]="!n.isRead">
                            <p>{{ n.message }}</p>
                            
                            <div class="notif-actions" *ngIf="n.type === 'PARTICIPATION_ACCEPTED'">
                                <button class="download-btn" (click)="downloadTicket(n.participationId, $event)">
                                    Download Ticket
                                </button>
                            </div>
                            
                            <span class="time">{{ n.createdAt | date:'short' }}</span>
                        </div>
                    </div>
                </div>
            </div>

            <button (click)="logout()" class="logout-btn">Logout</button>
        </ng-container>

        <ng-template #loginBtn>
            <button routerLink="/auth/login" class="cta-button">Login</button>
        </ng-template>
    </div>

    <div class="mobile-menu-toggle">☰</div>
</nav>

<main class="page">
    <router-outlet></router-outlet>
</main>
