<div class="clinic-wrapper">
    <!-- Sidebar -->
    <app-clinic-sidebar></app-clinic-sidebar>

    <!-- Main Content -->
    <div class="main-body">
        <app-clinic-topbar></app-clinic-topbar>

        <div class="content-area">
            <!-- Welcome Banner -->
            <div class="welcome-banner">
                <div class="banner-text">
                    <h1>Welcome back, {{ firstName || 'Clinic' }}!</h1>
                    <p>Manage your clinic operations, doctors, and emergency responses.</p>
                </div>

                <div class="banner-stats">
                    <div class="stat-card">
                        <div class="label">Active Doctors</div>
                        <div class="value"></div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Admitted Patients</div>
                        <div class="value"></div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Ambulances Ready</div>
                        <div class="value"></div>
                    </div>
                </div>
            </div>

            <!-- Main Dashboard Grid -->
            <div class="dashboard-grid">
                
                <!-- Left Column (2/3): Today's Schedule -->
                <div class="left-column">
                    <div class="section-card schedule-section">
                        <div class="section-header">
                            <h3>Today's Schedule</h3>
                            <a href="#">View All →</a>
                        </div>

                        <div class="schedule-table-wrapper">
                            <table class="schedule-table">
                                <thead>
                                    <tr>
                                        <th>Time</th>
                                        <th>Patient</th>
                                        <th>Doctor</th>
                                        <th>Status</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Right Column (1/3): Emergency Alerts -->
                <div class="right-column">
                    <div class="section-card alerts-section">
                        <div class="section-header">
                            <h3>Emergency Alerts</h3>
                        </div>

                        <div class="alerts-list">
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>
