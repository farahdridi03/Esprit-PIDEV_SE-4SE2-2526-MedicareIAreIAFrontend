<div class="dashboard-wrapper">
    <app-clinic-sidebar></app-clinic-sidebar>

    <div class="main-body">
        <app-clinic-topbar></app-clinic-topbar>

        <div class="content-area">
            <div class="edit-container" *ngIf="!loading; else loadingTpl">
                <div class="header-section">
                    <h1>Edit Profile</h1>
                    <p>Update your personal and clinic information</p>
                </div>

                <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="edit-form">
                    <div class="form-grid">
                        <!-- Left Column: Photo & Basic Info -->
                        <div class="form-column">
                            <div class="form-card main-card">
                                <h3>Basic Information</h3>
                                
                                <div class="photo-upload">
                                    <div class="photo-preview">
                                        <img [src]="photoPreview" *ngIf="photoPreview" alt="Profile Photo">
                                        <div class="photo-placeholder" *ngIf="!photoPreview">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                                            </svg>
                                        </div>
                                        <label for="photo-input" class="btn-change-photo">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15a2.25 2.25 0 002.25-2.25V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
                                            </svg>
                                        </label>
                                        <input type="file" id="photo-input" (change)="onFileSelected($event)" accept="image/*" class="hidden-input">
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>Full Name</label>
                                    <input type="text" formControlName="fullName" placeholder="Enter your full name">
                                    <span class="error-msg" *ngIf="profileForm.get('fullName')?.touched && profileForm.get('fullName')?.errors?.['required']">
                                        Full name is required
                                    </span>
                                </div>

                                <div class="form-group">
                                    <label>Email Address</label>
                                    <input type="email" formControlName="email">
                                    <p class="help-text">Email address cannot be changed</p>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Phone Number</label>
                                        <input type="text" formControlName="phone" placeholder="Enter phone number">
                                    </div>
                                    <div class="form-group">
                                        <label>Birth Date</label>
                                        <input type="date" formControlName="birthDate">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Right Column: Clinic Info -->
                        <div class="form-column">
                            <div class="form-card">
                                <h3>Clinic Details</h3>
                                
                                <div class="form-group">
                                    <label>Clinic Name</label>
                                    <input type="text" formControlName="clinicName" placeholder="Enter clinic name">
                                    <span class="error-msg" *ngIf="profileForm.get('clinicName')?.touched && profileForm.get('clinicName')?.errors?.['required']">
                                        Clinic name is required
                                    </span>
                                </div>

                                <div class="form-group">
                                    <label>Address</label>
                                    <textarea formControlName="address" rows="2" placeholder="Enter clinic address"></textarea>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Emergency Phone</label>
                                        <input type="text" formControlName="emergencyPhone" placeholder="3-digit emergency number">
                                    </div>
                                    <div class="form-group">
                                        <label>Ambulance Phone</label>
                                        <input type="text" formControlName="ambulancePhone" placeholder="3-digit ambulance number">
                                    </div>
                                </div>

                                <div class="emergency-switches mt-4">
                                    <div class="switch-item">
                                        <label class="switch">
                                            <input type="checkbox" formControlName="hasEmergency">
                                            <span class="slider round"></span>
                                        </label>
                                        <span>Has Emergency Services</span>
                                    </div>
                                    <div class="switch-item mt-2">
                                        <label class="switch">
                                            <input type="checkbox" formControlName="hasAmbulance">
                                            <span class="slider round"></span>
                                        </label>
                                        <span>Has Ambulance Service</span>
                                    </div>
                                </div>
                            </div>

                            <div class="form-actions">
                                <button type="button" class="btn-cancel" (click)="onCancel()" [disabled]="saving">Cancel</button>
                                <button type="submit" class="btn-save" [disabled]="profileForm.invalid || saving">
                                    <span *ngIf="!saving">Save Changes</span>
                                    <span *ngIf="saving" class="spinner-small"></span>
                                </button>
                            </div>

                            <div class="alert alert-danger mt-3" *ngIf="error">
                                {{ error }}
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <ng-template #loadingTpl>
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading your profile...</p>
                </div>
            </ng-template>
        </div>
    </div>
</div>
