<div class="lifestyle-form-wrapper">
    <app-nutritionist-sidebar></app-nutritionist-sidebar>
    <div class="main-body">
        <app-nutritionist-topbar></app-nutritionist-topbar>
        <div class="content-area">
            <div class="form-container">
                
                <header class="form-header">
                    <h1>{{ isEditMode ? 'Edit' : 'New' }} {{ type === 'plans' ? 'Dietary Plan' : (type === 'goals' ? 'Lifestyle Goal' : 'Progress Tracking Record') }}</h1>
                    <button class="btn-cancel" (click)="navigateBack()">Cancel</button>
                </header>

                <div class="form-card">
                    <form (ngSubmit)="onSubmit()" #lifestyleForm="ngForm" class="wellness-form">
                        
                        <!-- Goal Fields -->
                        <div *ngIf="type === 'goals'" class="form-grid">
                            <div class="form-group">
                                <label>Category</label>
                                <select name="category" [(ngModel)]="goal.category" required>
                                    <option value="WEIGHT_LOSS">Weight Loss</option>
                                    <option value="WEIGHT_GAIN">Weight Gain</option>
                                    <option value="MUSCLE_GAIN">Muscle Gain</option>
                                    <option value="MAINTENANCE">Maintenance</option>
                                    <option value="FITNESS">Fitness</option>
                                    <option value="NUTRITION">Nutrition</option>
                                    <option value="GENERAL_HEALTH">General Health</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Target Value</label>
                                <input type="number" name="targetValue" [(ngModel)]="goal.targetValue" required>
                            </div>
                            <div class="form-group">
                                <label>Baseline Value</label>
                                <input type="number" name="baselineValue" [(ngModel)]="goal.baselineValue" required>
                            </div>
                            <div class="form-group">
                                <label>Target Date</label>
                                <input type="date" name="targetDate" [(ngModel)]="goal.targetDate" required>
                            </div>
                            <div class="form-group" *ngIf="isEditMode">
                                <label>Status</label>
                                <select name="status" [(ngModel)]="goal.status">
                                    <option value="PENDING">Pending</option>
                                    <option value="IN_PROGRESS">In Progress</option>
                                    <option value="ACHIEVED">Achieved</option>
                                    <option value="COMPLETED">Completed</option>
                                    <option value="CANCELLED">Cancelled</option>
                                    <option value="ABANDONED">Abandoned</option>
                                </select>
                            </div>
                        </div>

                        <!-- Plan Fields (Dietary & Wellness) -->
                        <div *ngIf="type === 'plans'" class="form-grid">
                            <div class="form-group full-width">
                                <label>Plan Title</label>
                                <input type="text" name="title" [(ngModel)]="plan.title" required placeholder="e.g., High Protein Diet Plan">
                            </div>
                            <div class="form-group">
                                <label>Start Date</label>
                                <input type="date" name="startDate" [(ngModel)]="plan.startDate" required>
                            </div>
                            <div class="form-group">
                                <label>End Date</label>
                                <input type="date" name="endDate" [(ngModel)]="plan.endDate">
                            </div>
                            <div class="form-group">
                                <label>Target Goal</label>
                                <select name="goalId" [(ngModel)]="plan.goalId" required>
                                    <option [value]="null" disabled selected>Select a goal</option>
                                    <option *ngFor="let g of goals" [value]="g.id">{{ g.category }} (Target: {{ g.targetValue }})</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Status</label>
                                <select name="planStatus" [(ngModel)]="plan.status">
                                    <option value="ACTIVE">Active</option>
                                    <option value="COMPLETED">Completed</option>
                                    <option value="CANCELLED">Cancelled</option>
                                </select>
                            </div>
                            <div class="form-group full-width">
                                <label>Description & Instructions</label>
                                <textarea name="description" [(ngModel)]="plan.description" rows="4" placeholder="Detailed meal instructions, caloric limits, etc."></textarea>
                            </div>
                        </div>

                        <!-- Tracking Fields -->
                        <div *ngIf="type === 'tracking'" class="form-grid">
                            <div class="form-group">
                                <label>Select Goal to Track</label>
                                <select name="goalId" [(ngModel)]="tracking.goalId" required>
                                    <option *ngFor="let g of goals" [value]="g.id">{{ g.category }} (Target: {{ g.targetValue }})</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Value</label>
                                <input type="number" name="value" [(ngModel)]="tracking.value" required>
                            </div>
                            <div class="form-group">
                                <label>Date</label>
                                <input type="date" name="date" [(ngModel)]="tracking.date" required>
                            </div>
                            <div class="form-group">
                                <label>Notes</label>
                                <input type="text" name="notes" [(ngModel)]="tracking.notes">
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-submit" [disabled]="!lifestyleForm.form.valid">
                                {{ isEditMode ? 'Update' : 'Create' }} {{ type }}
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>
