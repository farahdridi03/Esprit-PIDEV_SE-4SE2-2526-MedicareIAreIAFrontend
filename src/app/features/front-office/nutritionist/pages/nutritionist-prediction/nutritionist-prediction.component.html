<div class="prediction-wrapper">
    <app-nutritionist-sidebar></app-nutritionist-sidebar>
    <div class="main-body">
        <app-nutritionist-topbar></app-nutritionist-topbar>
        <div class="content-area">
            <div class="form-container">
                
                <!-- Green Banner Header -->
                <div class="welcome-banner green">
                    <div class="banner-text">
                        <h1><i class="fas fa-robot"></i> AI Plan Recommendation</h1>
                        <p>Leverage machine learning to generate personalized diet and exercise plans.</p>
                    </div>
                    <div class="banner-actions-top">
                        <button class="btn-back-glass" (click)="navigateBack()">
                            <i class="fas fa-arrow-left"></i> Back to Form
                        </button>
                    </div>
                </div>

                <div class="form-card">
                    <div class="wellness-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Age</label>
                                <input type="number" placeholder="e.g. 25" [(ngModel)]="form.age" />
                            </div>
                            <div class="form-group">
                                <label>Gender</label>
                                <select [(ngModel)]="form.gender">
                                    <option [value]="0">Female</option>
                                    <option [value]="1">Male</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>BMI</label>
                                <input type="number" step="0.1" placeholder="e.g. 22.5" [(ngModel)]="form.bmi" />
                            </div>
                            <div class="form-group">
                                <label>Smoking Status</label>
                                <select [(ngModel)]="form.smoking_status">
                                    <option [value]="0">Never Smoked</option>
                                    <option [value]="1">Formerly Smoked</option>
                                    <option [value]="2">Smokes</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Physical Activity (0-3)</label>
                                <input type="number" min="0" max="3" placeholder="Level 0 to 3" [(ngModel)]="form.physical_activity" />
                            </div>
                            <div class="form-group">
                                <label>Cholesterol</label>
                                <input type="number" placeholder="mg/dL" [(ngModel)]="form.cholesterol" />
                            </div>
                            <div class="form-group">
                                <label>Glucose Level</label>
                                <input type="number" placeholder="mg/dL" [(ngModel)]="form.glucose_level" />
                            </div>
                            <div class="form-group">
                                <label>Heart Disease Risk</label>
                                <select [(ngModel)]="form.heart_disease_risk">
                                    <option [value]="0">Low</option>
                                    <option [value]="1">High</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Diabetes Risk</label>
                                <select [(ngModel)]="form.diabetes_risk">
                                    <option [value]="0">Low</option>
                                    <option [value]="1">Moderate</option>
                                    <option [value]="2">High</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button (click)="predict()" class="btn-submit" [disabled]="isLoading">
                                <span *ngIf="!isLoading"><i class="fas fa-magic"></i> Generate Recommendation</span>
                                <span *ngIf="isLoading"><i class="fas fa-spinner fa-spin"></i> Processing...</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Result Section -->
                <div *ngIf="result" class="result-card glass-card fade-in">
                    <div class="result-header">
                        <h3><i class="fas fa-check-circle"></i> AI Recommendations</h3>
                    </div>
                    <div class="result-content">
                        <div class="recommendation-item">
                            <div class="icon-box diet">
                                <i class="fas fa-utensils"></i>
                            </div>
                            <div class="text-box">
                                <h4>Dietary Recommendation</h4>
                                <p>{{ result.diet_recommendation }}</p>
                            </div>
                        </div>
                        <div class="recommendation-item">
                            <div class="icon-box exercise">
                                <i class="fas fa-running"></i>
                            </div>
                            <div class="text-box">
                                <h4>Exercise Recommendation</h4>
                                <p>{{ result.exercise_recommendation }}</p>
                            </div>
                        </div>
                    </div>

                    <div class="result-actions">
                        <button (click)="usePlan()" class="btn-use-plan">
                            <i class="fas fa-file-import"></i> Use this Recommendation
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
