<div class="pharmacist-wrapper">
  <app-pharmacist-sidebar></app-pharmacist-sidebar>
  <div class="main-body">
    <app-pharmacist-topbar></app-pharmacist-topbar>
    <div class="content-area">
      <div class="page-header">
        <h2>Stock Alerts</h2>
        <button class="btn-secondary" (click)="loadAlerts()">↻ Refresh</button>
      </div>

      <div *ngIf="loading" class="loading-state">Loading alerts...</div>
      <div *ngIf="error" class="error-state">{{ error }}</div>

      <div *ngIf="!loading && alerts.length === 0 && !error" class="empty-state success-state">
        ✓ No open alerts. All stock levels are healthy!
      </div>

      <div *ngIf="!loading && alerts.length > 0" class="alerts-grid">
        <div *ngFor="let alert of pagedAlerts" class="alert-card" [ngClass]="{
          'alert-low-stock': alert.alertType === 'LOW_STOCK',
          'alert-expiry': alert.alertType === 'EXPIRY_WARNING'
        }">
          <div class="alert-icon">
            <span *ngIf="alert.alertType === 'LOW_STOCK'">⚠️</span>
            <span *ngIf="alert.alertType === 'EXPIRY_WARNING'">📅</span>
            <span *ngIf="alert.alertType !== 'LOW_STOCK' && alert.alertType !== 'EXPIRY_WARNING'">🔔</span>
          </div>
          <div class="alert-body">
            <div class="alert-type">{{ alert.alertType | titlecase }}</div>
            <div class="alert-message">{{ alert.message }}</div>
            <div class="alert-time">{{ alert.createdAt | date:'medium' }}</div>
          </div>
          <div class="alert-actions">
            <button
              class="btn-sm btn-primary"
              (click)="resolveAlert(alert.id)"
              [disabled]="resolvingId === alert.id">
              {{ resolvingId === alert.id ? 'Resolving...' : 'Resolve' }}
            </button>
          </div>
        </div>
      </div>
      <div class="pagination-bar" *ngIf="totalPages > 1">
        <span class="page-info">{{ (currentPage-1)*pageSize+1 }}–{{ pageEnd }} of {{ alerts.length }}</span>
        <div class="page-controls">
          <button class="page-btn" (click)="goToPage(currentPage-1)" [disabled]="currentPage===1"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
          <button *ngFor="let p of pages" class="page-btn" [class.active]="p===currentPage" (click)="goToPage(p)">{{p}}</button>
          <button class="page-btn" (click)="goToPage(currentPage+1)" [disabled]="currentPage===totalPages"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
        </div>
      </div>
    </div>
  </div>
</div>
