<div class="modal-backdrop" (click)="onCancel()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h3>Change Password</h3>
            <button class="btn-close" (click)="onCancel()">&times;</button>
        </div>

        <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
            <div class="modal-body">
                <div class="alert alert-error" *ngIf="errorMessage">
                    {{ errorMessage }}
                </div>

                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" formControlName="currentPassword" placeholder="Enter current password">
                    <span class="error-text" *ngIf="passwordForm.get('currentPassword')?.touched && passwordForm.get('currentPassword')?.errors?.['required']">
                        Current password is required
                    </span>
                </div>

                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" formControlName="newPassword" placeholder="Enter new password (min 6 chars)">
                    <span class="error-text" *ngIf="passwordForm.get('newPassword')?.touched && passwordForm.get('newPassword')?.errors?.['required']">
                        New password is required
                    </span>
                    <span class="error-text" *ngIf="passwordForm.get('newPassword')?.touched && passwordForm.get('newPassword')?.errors?.['minlength']">
                        Password must be at least 6 characters
                    </span>
                </div>

                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" formControlName="confirmPassword" placeholder="Confirm new password">
                    <span class="error-text" *ngIf="passwordForm.get('confirmPassword')?.touched && passwordForm.errors?.['mismatch']">
                        Passwords do not match
                    </span>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-secondary" (click)="onCancel()" [disabled]="loading">Cancel</button>
                <button type="submit" class="btn-primary" [disabled]="passwordForm.invalid || loading">
                    <span class="spinner" *ngIf="loading"></span>
                    {{ loading ? 'Updating...' : 'Update Password' }}
                </button>
            </div>
        </form>
    </div>
</div>
