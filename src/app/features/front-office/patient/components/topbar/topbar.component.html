<div class="topbar">
    <div class="toggle-menu">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
    </div>

    <div class="search-bar">
        <span class="search-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
            </svg>
        </span>
        <input type="text" placeholder="Search...">
    </div>

    <div class="topbar-right">
        <!-- 🔔 NOTIFICATION BELL -->
        <div class="notification-icon" (click)="toggleDropdown()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
            </svg>
            <div class="badge" *ngIf="unreadCount > 0"></div>

            <!-- Dropdown Panel -->
            <div class="notif-dropdown" *ngIf="showDropdown" (click)="$event.stopPropagation()">
                <div class="notif-header">
                    <span class="notif-header-title">🔔 Notifications</span>
                    <div class="notif-header-actions">
                        <button (click)="markAllRead()">Tout lire</button>
                        <button (click)="clearAll()">Effacer</button>
                    </div>
                </div>

                <div class="notif-list">
                    <div *ngIf="notifications.length === 0" class="notif-empty">
                        Aucune notification
                    </div>
                    <div class="notif-item" *ngFor="let n of notifications" [class.unread]="!n.read">
                        <div class="notif-icon">
                            <span *ngIf="n.type === 'info'">🎉</span>
                            <span *ngIf="n.type === 'aid_request'">🤝</span>
                            <span *ngIf="n.type === 'warning'">⚠️</span>
                        </div>
                        <div class="notif-content">
                            <div class="notif-title">{{ n.title }}</div>
                            <div class="notif-msg">{{ n.message }}</div>
                            <div class="notif-time">{{ timeAgo(n.timestamp) }}</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="user-profile">
            <div class="avatar">
                <img [src]="photo!" *ngIf="photo" class="topbar-photo" alt="Profile" style="object-fit: cover; border: 2px solid #0e7c66;">
                <span *ngIf="!photo">{{ initials || 'U' }}</span>
            </div>
            <div class="user-info">
                <span class="user-name">{{ firstName || 'User' }}</span>
            </div>
        </div>
    </div>
</div>
