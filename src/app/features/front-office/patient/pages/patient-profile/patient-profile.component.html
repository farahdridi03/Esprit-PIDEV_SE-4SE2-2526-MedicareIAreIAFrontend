<div class="wrapper">
<div class="wrapper">
    <app-sidebar></app-sidebar>

    <div class="main-body">
        <app-topbar></app-topbar>

        <div class="content-area">
            <div class="page-header">
                <h1>Profile Settings</h1>
                <p>Manage your personal and health information</p>
            </div>

            <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
            <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

            <div class="profile-section">
                <form (ngSubmit)="onSubmit()" #profileForm="ngForm" class="profile-form">
                    
                    <!-- Photo Section -->
                    <div class="photo-section">
                        <h3>Profile Picture</h3>
                        <div class="photo-uploader">
                            <div class="photo-placeholder">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                                </svg>
                            </div>
                            <div class="upload-btn-container">
                                <button type="button" class="upload-btn">Choose an image</button>
                                <small>Accepted formats: JPG, PNG. 1:1 ratio recommended.</small>
                            </div>
                        </div>
                    </div>

                    <hr class="divider">

                    <!-- Account Section -->
                    <h3>Account Information</h3>
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>Full Name</label>
                            <input type="text" name="fullName" [(ngModel)]="profileData.fullName" class="form-control" required>
                        </div>
                        <div class="form-group flex-1">
                            <label>Email Address</label>
                            <input type="email" name="email" [(ngModel)]="profileData.email" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>New password (leave blank to keep current)</label>
                        <input type="password" name="password" [(ngModel)]="profileData.password" class="form-control">
                    </div>

                    <hr class="divider">

                    <!-- Medical Section -->
                    <h3>Contact and Health</h3>
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>Phone</label>
                            <input type="tel" name="phone" [(ngModel)]="profileData.phone" class="form-control">
                        </div>
                        <div class="form-group flex-1">
                            <label>Date of Birth</label>
                            <input type="date" name="birthDate" [(ngModel)]="profileData.birthDate" class="form-control">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>Gender</label>
                            <select name="gender" [(ngModel)]="profileData.gender" class="form-control">
                                <option value="MALE">Male</option>
                                <option value="FEMALE">Female</option>
                            </select>
                        </div>
                        <div class="form-group flex-1">
                            <label>Blood Type</label>
                            <select name="bloodType" [(ngModel)]="profileData.bloodType" class="form-control">
                                <option value="O_POS">O+</option>
                                <option value="O_NEG">O-</option>
                                <option value="A_POS">A+</option>
                                <option value="A_NEG">A-</option>
                                <option value="B_POS">B+</option>
                                <option value="B_NEG">B-</option>
                                <option value="AB_POS">AB+</option>
                                <option value="AB_NEG">AB-</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>Emergency Contact (Name)</label>
                            <input type="text" name="emergencyContactName" [(ngModel)]="profileData.emergencyContactName" class="form-control">
                        </div>
                        <div class="form-group flex-1">
                            <label>Emergency Contact Phone</label>
                            <input type="tel" name="emergencyContactPhone" [(ngModel)]="profileData.emergencyContactPhone" class="form-control">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="save-btn" [disabled]="!profileForm.valid">Save changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
