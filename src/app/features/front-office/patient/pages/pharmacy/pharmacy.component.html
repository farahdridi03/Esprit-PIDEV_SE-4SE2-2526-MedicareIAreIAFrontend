<div class="dashboard-wrapper">
    <app-sidebar></app-sidebar>

    <div class="main-body">
        <app-topbar></app-topbar>

        <div class="content-area">
            <div class="pharmacy-main-content">
                
                <!-- Welcome/Header Banner -->
                <div class="welcome-banner">
                    <div class="banner-text">
                        <h1>Pharmacies Disponibles</h1>
                        <p>Trouvez et consultez les pharmacies disponibles pour vos commandes.</p>
                    </div>
                </div>

                <!-- Page Actions -->
                <div class="page-actions">
                    <div class="actions-left">
                        <button class="action-btn secondary" routerLink="/front/patient/pharmacy-orders">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                            </svg>
                            Mes Commandes
                        </button>
                    </div>
                    <div class="actions-right">
                        <button class="action-btn primary" routerLink="/front/patient/pharmacy-orders/new">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                            </svg>
                            Nouvelle Commande
                        </button>
                    </div>
                </div>

                <!-- Content States -->
                <div class="states-container" *ngIf="isLoading || error || pharmacies.length === 0">
                    <div class="info-card center" *ngIf="isLoading">
                        <div class="spinner"></div>
                        <p>Chargement des pharmacies...</p>
                    </div>

                    <div class="info-card center error" *ngIf="error">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="state-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                        <p>{{ error }}</p>
                        <button class="action-btn outline mt-3" (click)="loadPharmacies()">Réessayer</button>
                    </div>

                    <div class="info-card center empty" *ngIf="!isLoading && !error && pharmacies.length === 0">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="state-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                        </svg>
                        <p>Aucune pharmacie trouvée dans votre région.</p>
                    </div>
                </div>

                <!-- Pharmacy Grid -->
                <div class="pharmacy-grid" *ngIf="!isLoading && !error && pharmacies.length > 0">
                    <div class="pharmacy-card" *ngFor="let p of pharmacies">
                        <div class="pharmacy-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                            </svg>
                        </div>
                        <div class="pharmacy-info">
                            <h3>{{ p.name }}</h3>
                            <div class="info-row">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="info-icon">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                                <span>{{ p.address }}</span>
                            </div>
                            <div class="info-row">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="info-icon">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                                </svg>
                                <span>{{ p.phoneNumber || 'N/A' }}</span>
                            </div>
                        </div>
                        <div class="pharmacy-actions">
                            <button class="action-btn outline btn-sm" routerLink="/front/patient/pharmacy-orders/new">
                                Commander ici
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
