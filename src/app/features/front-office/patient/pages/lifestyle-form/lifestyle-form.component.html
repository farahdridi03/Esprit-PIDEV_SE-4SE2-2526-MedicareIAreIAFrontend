<div class="lifestyle-form-wrapper">
    <app-sidebar></app-sidebar>
    <div class="main-body">
        <app-topbar></app-topbar>
        <div class="content-area">
            <div class="form-container">
                
                <header class="form-header">
                    <h1>{{ isEditMode ? 'Edit' : 'New' }} {{ type === 'goals' ? 'Lifestyle Goal' : (type === 'plans' ? 'Dietary Plan' : 'Progress Tracking') }}</h1>
                    <button class="btn-cancel" (click)="navigateBack()">Cancel</button>
                </header>

                <div class="form-card">
                    <form (ngSubmit)="onSubmit()" #lifestyleForm="ngForm">
                        
                        <!-- Goals Form -->
                        <div *ngIf="type === 'goals'" class="form-grid">
                            <div class="form-group">
                                <label for="category">Category</label>
                                <select id="category" name="category" [(ngModel)]="goal.category" required>
                                    <option value="WEIGHT_LOSS">Weight Loss</option>
                                    <option value="WEIGHT_GAIN">Weight Gain</option>
                                    <option value="MUSCLE_GAIN">Muscle Gain</option>
                                    <option value="MAINTENANCE">Maintenance</option>
                                    <option value="FITNESS">Fitness</option>
                                    <option value="NUTRITION">Nutrition</option>
                                    <option value="GENERAL_HEALTH">General Health</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="targetDate">Target Date</label>
                                <input type="date" id="targetDate" name="targetDate" [(ngModel)]="goal.targetDate" required>
                            </div>
                            <div class="form-group">
                                <label for="targetValue">Target Value</label>
                                <input type="number" id="targetValue" name="targetValue" [(ngModel)]="goal.targetValue" placeholder="e.g. 70" required>
                            </div>
                            <div class="form-group">
                                <label for="baselineValue">Baseline Value</label>
                                <input type="number" id="baselineValue" name="baselineValue" [(ngModel)]="goal.baselineValue" placeholder="e.g. 75" required>
                            </div>
                            <div class="form-group" *ngIf="isEditMode">
                                <label for="status">Status</label>
                                <select id="status" name="status" [(ngModel)]="goal.status">
                                    <option value="PENDING">Pending</option>
                                    <option value="IN_PROGRESS">In Progress</option>
                                    <option value="ACHIEVED">Achieved</option>
                                    <option value="CANCELLED">Cancelled</option>
                                    <option value="COMPLETED">Completed</option>
                                    <option value="ABANDONED">Abandoned</option>
                                </select>
                            </div>
                        </div>

                         <!-- Tracking Form -->
                         <div *ngIf="type === 'tracking'" class="form-grid">
                             <div class="form-group">
                                 <label for="goalId">Select Goal</label>
                                 <select id="goalId" name="goalId" [(ngModel)]="tracking.goalId" required>
                                     <option [ngValue]="null" disabled selected>-- Select a Goal --</option>
                                     <option *ngFor="let g of goals" [ngValue]="g.id">
                                         {{ g.category }} (Target: {{ g.targetValue }})
                                     </option>
                                 </select>
                             </div>
                             <div class="form-group">
                                 <label for="date">Date</label>
                                 <input type="date" id="date" name="date" [(ngModel)]="tracking.date" required>
                             </div>
                             <div class="form-group">
                                 <label for="value">Value</label>
                                 <input type="number" id="value" name="value" [(ngModel)]="tracking.value" placeholder="e.g. 72" required>
                             </div>
                             <div class="form-group">
                                 <label for="notes">Notes</label>
                                 <textarea id="notes" name="notes" [(ngModel)]="tracking.notes" placeholder="Any additional details..." rows="3" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;"></textarea>
                             </div>
                         </div>
                         <!-- Plans Form -->
                         <div *ngIf="type === 'plans'" class="form-grid">
                            <div class="form-group">
                                <label for="title">Plan Title</label>
                                <input type="text" id="title" name="title" [(ngModel)]="plan.title" placeholder="e.g. Ketogenic Diet Plan" required>
                            </div>
                            <div class="form-group">
                                <label for="goalId">Linked Goal</label>
                                <select id="goalId" name="goalId" [(ngModel)]="plan.goalId" required>
                                    <option [ngValue]="null" disabled selected>-- Select Goal --</option>
                                    <option *ngFor="let g of goals" [ngValue]="g.id">
                                        {{ g.category }}
                                    </option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="startDate">Start Date</label>
                                <input type="date" id="startDate" name="startDate" [(ngModel)]="plan.startDate" required>
                            </div>
                            <div class="form-group">
                                <label for="endDate">End Date (Optional)</label>
                                <input type="date" id="endDate" name="endDate" [(ngModel)]="plan.endDate">
                            </div>
                            <div class="form-group full-width" style="grid-column: span 2;">
                                <label for="description">Plan Details & Instructions</label>
                                <textarea id="description" name="description" [(ngModel)]="plan.description" placeholder="Specify diet details..." rows="4" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;"></textarea>
                            </div>
                         </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-submit" [disabled]="!lifestyleForm.form.valid || isLoading">
                                {{ isLoading ? 'Saving...' : 'Save Changes' }}
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>
