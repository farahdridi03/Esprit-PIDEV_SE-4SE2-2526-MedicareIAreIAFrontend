<div class="topbar">
    <div class="toggle-menu">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
    </div>

    <div class="search-bar">
        <span class="search-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
            </svg>
        </span>
        <input type="text" placeholder="Search...">
    </div>

    <div class="topbar-right">
        <div class="user-profile" routerLink="/front/laboratorystaff/profile" style="cursor: pointer;">
            <div class="avatar">
                <img [src]="photo!" *ngIf="photo" class="topbar-photo" alt="Profile" style="width: 100%; height: 100%; object-fit: cover;">
                <span *ngIf="!photo">{{ initials || 'L' }}</span>
            </div>
            <div class="user-info">
                <span class="user-name">{{ firstName || 'User' }}</span>
                <span class="user-id">Laboratory Staff</span>
            </div>
        </div>
    </div>
</div>
