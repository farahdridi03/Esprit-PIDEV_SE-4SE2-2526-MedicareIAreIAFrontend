<div class="page-wrapper">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <polyline points="2,12 6,6 10,14 14,8 18,16 22,12"
            stroke="white" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">MediCareAI</span>
    </div>
  </div>

  <div class="card">
    <h1 class="title">Forgot Password</h1>
    <p class="subtitle">Please enter your email address to recover your password</p>

    <div class="form-group">
      <label class="label">EMAIL <span class="required">*</span></label>
      <div class="input-wrapper">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="4" width="20" height="16" rx="2" stroke="#aaa" stroke-width="1.5"/>
          <polyline points="2,4 12,13 22,4" stroke="#aaa" stroke-width="1.5" fill="none"/>
        </svg>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="name@healthcare.com"
          class="input"
        />
      </div>
    </div>

    <div class="success-msg" *ngIf="successMessage">✅ {{ successMessage }}</div>
    <div class="error-msg" *ngIf="errorMessage">❌ {{ errorMessage }}</div>

    <button class="btn-send" (click)="onSend()" [disabled]="loading">
      <span *ngIf="!loading">Send →</span>
      <span *ngIf="loading">Sending...</span>
    </button>

    <hr class="divider"/>

    <a routerLink="/auth/login" class="back-link">← Back to login page</a>
  </div>

  <div class="footer">
    <p>Need immediate assistance? <a href="#">Contact Support</a></p>
    <div class="footer-links">
      <a href="#">PRIVACY POLICY</a>
      <a href="#">TERMS OF SERVICE</a>
      <a href="#">HELP CENTER</a>
    </div>
    <p class="copyright">© 2024 MEDICAREAI HEALTH SYSTEMS. ALL RIGHTS RESERVED.</p>
  </div>

</div>
