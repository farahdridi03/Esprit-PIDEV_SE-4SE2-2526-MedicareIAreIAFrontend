<div class="login-page">
  <div class="login-container">

    <!-- ── TOP: Header block ── -->
    <div class="login-header">
      <!-- Decorative SVG circles -->
      <svg class="deco-circles" viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg">
        <circle cx="340" cy="-20" r="100" fill="none" stroke="white" stroke-opacity="0.08" stroke-width="1.5"/>
        <circle cx="340" cy="-20" r="70"  fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1.5"/>
        <circle cx="60"  cy="200" r="120" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1.5"/>
        <circle cx="200" cy="110" r="160" fill="none" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
      </svg>

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0112 5.052 5.5 5.5 0 0116.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z"/>
          </svg>
        </div>
        <span class="brand-name">MediCareAI</span>
      </div>
      <p class="brand-tagline">Your trusted health management platform</p>
    </div>

    <!-- ── AVATAR: overlapping circle ── -->
    <div class="avatar-wrap">
      <div class="avatar-circle">{{ initials }}</div>
    </div>

    <!-- ── BOTTOM: White card ── -->
    <div class="login-card">
      <h2 class="card-title">{{ displayName }}</h2>
      <p class="card-subtitle">{{ displayRole }}</p>

      <!-- Error alert -->
      <div class="error-alert" *ngIf="errorMessage">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
              </svg>
            </span>
            <input type="email" id="email" formControlName="email" placeholder="you@example.com"
              autocomplete="email"
              [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"/>
          </div>
          <span class="field-error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']">Email is required.</span>
          <span class="field-error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']">Enter a valid email address.</span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <div class="label-row">
            <label for="password">Password</label>
            <a routerLink="/auth/forgot-password" class="forgot-link">Forgot password?</a>
          </div>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
              </svg>
            </span>
            <input type="password" id="password" formControlName="password" placeholder="••••••••"
              autocomplete="current-password"
              [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"/>
          </div>
          <span class="field-error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']">Password is required.</span>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" [disabled]="isLoading">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="spinner-wrap">
            <svg class="spinner" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
              <path d="M12 2a10 10 0 0110 10" stroke="white" stroke-width="3" stroke-linecap="round"/>
            </svg>
            Signing in...
          </span>
        </button>
      </form>

      <p class="footer-text">
        Don't have an account?
        <a routerLink="/auth/register" class="signup-link">Sign up</a>
      </p>
    </div>

  </div>
</div>
