<div class="login-wrapper">
  <div class="login-card" style="text-align: center;">
    <div class="brand-header" style="justify-content: center;">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
          <path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0112 5.052 5.5 5.5 0 0116.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z" />
        </svg>
      </div>
      <span class="brand-name">MEDICAREAI</span>
    </div>

    <!-- Error State -->
    <div *ngIf="errorMessage" class="error-alert" style="margin-top: 20px;">
      {{ errorMessage }}
    </div>
    
    <div *ngIf="errorMessage" style="margin-top: 20px;">
      <button class="submit-btn" (click)="goToLogin()">Return to Login</button>
    </div>

    <!-- Loading State -->
    <div *ngIf="!errorMessage" style="margin-top: 30px;">
      <h2 style="color: #333; margin-bottom: 10px;">Authenticating...</h2>
      <p style="color: #666;">Please wait while we log you in.</p>
      
      <!-- Simple spinner -->
      <div style="margin-top: 30px;">
        <svg class="spinner" width="40px" height="40px" viewBox="0 0 50 50" style="animation: spin 1s linear infinite;">
          <circle cx="25" cy="25" r="20" fill="none" stroke="#2563eb" stroke-width="4" stroke-dasharray="31.4 31.4" style="stroke-linecap: round;"></circle>
        </svg>
      </div>
    </div>
  </div>
</div>

<style>
@keyframes spin {
  100% {
    transform: rotate(360deg);
  }
}
</style>
