<div class="page-wrapper">
  <div class="logo-section">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <polyline points="2,12 6,6 10,14 14,8 18,16 22,12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 class="title">Create a new password</h1>
    <p class="subtitle">Please enter your new password</p>
  </div>
  <div class="card">
    <div class="form-group">
      <label class="label">NEW PASSWORD <span class="required">*</span></label>
      <div class="input-wrapper">
        <input [type]="showNew ? 'text' : 'password'" [(ngModel)]="newPassword" placeholder="��������" class="input"/>
        <span class="eye-icon" (click)="showNew = !showNew">??</span>
      </div>
    </div>
    <div class="form-group">
      <label class="label">CONFIRM YOUR NEW PASSWORD <span class="required">*</span></label>
      <div class="input-wrapper">
        <input [type]="showConfirm ? 'text' : 'password'" [(ngModel)]="confirmPassword" placeholder="��������" class="input"/>
        <span class="eye-icon" (click)="showConfirm = !showConfirm">??</span>
      </div>
    </div>
    <div class="success-msg" *ngIf="successMessage">? {{ successMessage }}</div>
    <div class="error-msg" *ngIf="errorMessage">? {{ errorMessage }}</div>
    <button class="btn-save" (click)="onSave()" [disabled]="loading">
      <span *ngIf="!loading">Save</span>
      <span *ngIf="loading">Saving...</span>
    </button>
    <a routerLink="/auth/login" class="back-link">? Back to login page</a>
  </div>
  <div class="security-note">
    <span class="shield">??</span>
    <p>Ensure your password is at least 8 characters long and contains a mix of letters, numbers, and symbols for maximum security.</p>
  </div>
</div>
