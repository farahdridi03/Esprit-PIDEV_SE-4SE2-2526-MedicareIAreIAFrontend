<div class="page-header">
    <div>
        <h1>{{ isEditMode ? 'Edit' : 'Create' }} <em>Event</em></h1>
        <p>Schedule a new medical conference or webinar</p>
    </div>
    <button class="action-btn" style="background:#fff; border:1px solid #ddd; padding:8px 16px; border-radius:4px; cursor:pointer;" routerLink="/admin/events">
        ← Back to Events
    </button>
</div>

<div class="panel">
    <div class="panel-head">
        <div class="panel-title">Event Details</div>
    </div>

    <div class="loader" *ngIf="loading">Processing...</div>

    <div class="form-container" *ngIf="!loading">
        <form [formGroup]="eventForm" (ngSubmit)="saveEvent()">
            
            <div class="form-grid">
                <!-- Basic Info -->
                <div class="form-group" style="grid-column: span 2;">
                    <label>Event Title *</label>
                    <input type="text" formControlName="title" placeholder="e.g. Annual Medical Summit">
                </div>

                <div class="form-group" style="grid-column: span 2;">
                    <label>Description *</label>
                    <input type="text" formControlName="description">
                </div>

                <div class="form-group">
                    <label>Date & Time *</label>
                    <input type="datetime-local" formControlName="date">
                </div>

                <div class="form-group">
                    <label>Event Type *</label>
                    <select formControlName="eventType">
                        <option value="PHYSICAL">Physical (In-Person)</option>
                        <option value="ONLINE">Online (Virtual)</option>
                    </select>
                </div>
            </div>

            <!-- PHYSICAL FIELDS -->
            <div *ngIf="eventForm.get('eventType')?.value === 'PHYSICAL'" style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #eee;">
                <h4 style="margin-bottom: 1rem; color: #0e7c66;">📍 Location Details</h4>
                <div class="form-grid">
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Venue Name *</label>
                        <input type="text" formControlName="venueName" placeholder="Grand Hotel Conference Center">
                    </div>
                    
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Address *</label>
                        <input type="text" formControlName="address">
                    </div>

                    <div class="form-group">
                        <label>City *</label>
                        <input type="text" formControlName="city">
                    </div>

                    <div class="form-group">
                        <label>Postal Code</label>
                        <input type="text" formControlName="postalCode">
                    </div>

                    <div class="form-group">
                        <label>Country *</label>
                        <input type="text" formControlName="country">
                    </div>

                    <div class="form-group">
                        <label>Maximum Capacity</label>
                        <input type="number" formControlName="capacity" placeholder="e.g. 500">
                    </div>
                </div>
            </div>

            <!-- ONLINE FIELDS -->
            <div *ngIf="eventForm.get('eventType')?.value === 'ONLINE'" style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #eee;">
                <h4 style="margin-bottom: 1rem; color: #4f46e5;">💻 Virtual Meeting Details</h4>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Platform Name *</label>
                        <input type="text" formControlName="platformName" placeholder="Zoom, Google Meet, Teams...">
                    </div>

                    <div class="form-group">
                        <label>Meeting Link *</label>
                        <input type="url" formControlName="meetingLink" placeholder="https://zoom.us/j/123...">
                    </div>

                    <div class="form-group">
                        <label>Meeting Password (Optional)</label>
                        <input type="text" formControlName="meetingPassword">
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-secondary" routerLink="/admin/events">Cancel</button>
                <button type="submit" class="btn-primary" [disabled]="eventForm.invalid || loading">
                    {{ isEditMode ? 'Update Event' : 'Create Event' }}
                </button>
            </div>
        </form>
    </div>
</div>
