<div class="topbar">
    <div class="toggle-menu">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
    </div>
    <div class="search-bar">
        <span class="search-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
            </svg></span>
        <input type="text" placeholder="Search users, events, logs...">
    </div>
    <div class="topbar-right">

        <!-- 🔔 NOTIFICATION BELL -->
        <div class="tb-icon-btn notif-wrapper" (click)="toggleDropdown()">
            <div class="notif-dot" *ngIf="unreadCount > 0"></div>
            <span class="notif-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
            </svg>

            <!-- Dropdown Panel -->
            <div class="notif-dropdown" *ngIf="showDropdown" (click)="$event.stopPropagation()">
                <div class="notif-header">
                    <span class="notif-header-title">🔔 Notifications</span>
                    <div class="notif-header-actions">
                        <button (click)="markAllRead()">Mark all read</button>
                        <button (click)="clearAll()">Clear</button>
                    </div>
                </div>

                <div class="notif-list">
                    <div *ngIf="notifications.length === 0" class="notif-empty">
                        No notifications
                    </div>
                    <div class="notif-item" *ngFor="let n of notifications" [class.unread]="!n.read">
                        <div class="notif-icon">{{ getIcon(n.type) }}</div>
                        <div class="notif-content">
                            <div class="notif-title">{{ n.title }}</div>
                            <div class="notif-msg">{{ n.message }}</div>
                            <div class="notif-time">{{ timeAgo(n.timestamp) }}</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tb-icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
            </svg>
        </div>
        <div class="user-profile">
            <div class="avatar">{{ initials }}</div>
            <div>
                <div class="user-name">{{ firstName }}</div>
                <div class="user-role">System Administrator</div>
            </div>
        </div>
    </div>
</div>
