# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
name: Build and deploy Node.js app to Azure Web App - app-frontend1

on:
  push:
    branches:
      - frontmedicare11
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install and build
        run: |
          npm cache clean --force
          npm install
          chmod +x ./node_modules/.bin/ng
          ./node_modules/.bin/ng build --configuration=production
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist/medi-care-ai/browser

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D59FD151C95C48FBA689C9633E046A48 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_46A515C731284719A246E410048E4F10 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DB5386BDA81A4B7BB9FF45789A0C6BFD }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-frontend1'
          slot-name: 'Production'
          package: .
